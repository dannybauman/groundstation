# Local TiTiler for sustained use — be a good neighbor to titiler.xyz.
#   docker compose up -d titiler
#   export GROUNDSTATION_TITILER=http://localhost:8000
#
# Caveat: some Earth Search collections (NAIP, Landsat) live in requester-pays
# buckets. titiler.xyz carries AWS credentials for those; a local TiTiler serves
# them only if you provide your own (uncomment the AWS_* lines below — requests
# are then billed to your AWS account).
services:
  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      WORKERS_PER_CORE: 1
      # public buckets need unsigned requests when no AWS credentials are present
      # (found by a field-test agent: Sentinel-1 statistics 500'd without this)
      AWS_NO_SIGN_REQUEST: "YES"
      # AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      # AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_REQUEST_PAYER: requester

  # Self-documentation prototype: the instance serves its own agent entry point.
  #   docker compose up -d selfdoc   →   http://localhost:8001/llms.txt
  # An agent pointed at a bare instance bootstraps the usage-judgment layer
  # (skills/) from the service itself instead of a pre-installed plugin.
  # See docs/rfc-modularity.md.
  selfdoc:
    image: python:3.12-alpine
    command: python -m http.server 8001 -d /srv
    ports:
      - "8001:8001"
    volumes:
      # /srv is not :ro — Docker must mkdir the nested skills mountpoints under it.
      - ./selfdoc:/srv
      - ./skills/titiler:/srv/skills/titiler:ro
      - ./skills/stac-api:/srv/skills/stac-api:ro
